name: Extraer Materiales

on:
  push:
    paths:
      - GM_2019_V1_1-303.pdf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        run: python extract_materiales.py

      - name: Copiar Excel a docs
        run: |
          mkdir -p docs
          cp materiales.xlsx docs/materiales.xlsx

      - name: Commit y push Excel
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: actions@github.com
          message: "Actualizar Excel generado"
          add: "docs/materiales.xlsx" 
