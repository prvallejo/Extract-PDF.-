name: Extraer Materiales

on:
  push:
    paths:
      - GM_2019_V1_1-303.pdf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        run: python extract_materiales.py

      - name: Copiar Excel a docs
        run: |
          mkdir -p docs
          cp materiales.xlsx docs/materiales.xlsx

      - name: Commit y push Excel
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/materiales.xlsx || echo "No hay Excel para agregar"
          git commit -m "Actualizar Excel generado" || echo "Sin cambios que commitear"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
